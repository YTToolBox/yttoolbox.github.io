<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Toolbox | Professional Creator Tools</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #f97316; --text: #f8fafc; --muted: #94a3b8; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; text-decoration: none; }
        body { background: var(--bg); color: var(--text); }
        .navbar { background: var(--card); padding:20px; text-align:center; border-bottom:2px solid var(--primary); }
        .navbar h1 { color:var(--primary); font-size:28px; font-weight:900; }
        .container { max-width:1000px; margin:50px auto; padding:0 20px; text-align: center;}
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 40px;}
        .tool-card { background:var(--card); padding:35px; border-radius:15px; border:1px solid #334155; transition:0.3s; color: var(--text); display: block;}
        .tool-card:hover { border-color:var(--primary); transform:translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h3 { color: var(--primary); font-size: 22px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="navbar"><h1>YT TOOLBOX</h1></div>
    <div class="container">
        <h2>YouTube SEO & Content Suite 🚀</h2>
        <p style="color:var(--muted)">Professional tools to grow your channel, powered by BSR Studios.</p>
        <div class="grid">
            <a href="tools/thumbnail-extractor/" class="tool-card">
                <div class="icon">🖼️</div>
                <h3>Thumbnail Extractor</h3>
                <p>Download HD thumbnails directly to your device.</p>
            </a>
            <a href="tools/tags-extractor/" class="tool-card">
                <div class="icon">🏷️</div>
                <h3>Tags Extractor</h3>
                <p>Get viral comma-separated tags for your videos.</p>
            </a>
        </div>
    </div>
</body>
</html>
