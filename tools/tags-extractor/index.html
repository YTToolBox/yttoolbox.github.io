<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags Extractor | YT Toolbox</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #f97316; --text: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; text-decoration: none;}
        body { background: var(--bg); color: var(--text); padding-bottom:50px; }
        .navbar { background: var(--card); padding:20px; text-align:center; border-bottom:2px solid var(--primary); }
        .container { max-width:800px; margin:40px auto; padding:0 20px; text-align:center; }
        .back-btn { background:#334155; color:white; padding:10px 20px; border-radius:8px; display:inline-block; margin-bottom:30px; font-weight:bold; }
        .panel { background:var(--card); padding:30px; border-radius:15px; border:1px solid #334155; }
        input { width:100%; padding:15px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white; margin-bottom:20px; font-size:16px;}
        .btn { background:var(--primary); color:white; border:none; padding:15px 30px; font-weight:bold; border-radius:8px; cursor:pointer; width:100%; font-size:18px;}
        #result { margin-top:30px; display:none; text-align: left;}
        textarea { width:100%; height:200px; background:#0f172a; color:#10b981; border:1px solid #334155; border-radius:10px; padding:15px; font-family:monospace; resize:none; font-size:15px;}
        .copy-btn { background:#10b981; color:white; border:none; padding:15px; border-radius:8px; cursor:pointer; width:100%; font-weight:bold; margin-top:15px;}
    </style>
</head>
<body>
<div class="navbar"><h1 style="color:var(--primary)">YT TOOLBOX</h1></div>
<div class="container">
    <div style="text-align: left;"><a href="../../" class="back-btn">← Home</a></div>
    <div class="panel">
        <h2>🏷️ Viral Tags Extractor</h2><br>
        <input type="text" id="url" placeholder="Paste YouTube Video Link...">
        <button class="btn" onclick="getTags()">Extract Comma-Tags</button>
        <div id="result">
            <textarea id="output" readonly></textarea>
            <button class="copy-btn" onclick="copy()">Copy All Tags</button>
        </div>
    </div>
</div>
<script>
    // CEO SIR: Aapka Worker Link yahan hai
    const WORKER_URL = "https://yt-api-engine.aryanmewadastudios.workers.dev/";

    async function getTags() {
        const id = document.getElementById('url').value.match(/(?:v=|\/|youtu\.be\/|shorts\/)([0-9A-Za-z_-]{11})/)?.[1];
        if(!id) return alert("Sahi link daliye!");
        
        const box = document.getElementById('output');
        document.getElementById('result').style.display = 'block';
        box.value = "⚡ BSR Worker connecting... Please wait.";

        try {
            // Worker ko call kar rahe hain
            const res = await fetch(`${WORKER_URL}?id=${id}`);
            const data = await res.json();
            
            if(data.items && data.items.length > 0) {
                const tags = data.items[0].snippet.tags;
                box.value = tags ? tags.join(', ') : "Is video mein koi tags nahi mile.";
            } else {
                box.value = "Video data nahi mila. Check link.";
            }
        } catch (e) {
            box.value = "❌ Error: Cloudflare Worker ne block kiya ya API Key galat hai.";
        }
    }
    function copy() {
        const t = document.getElementById('output'); t.select(); document.execCommand('copy');
        alert("✅ Tags copied for YT Studio!");
    }
</script>
</body>
</html>
